<!DOCTYPE html>
<html>
<head>
  <title>Game of Becoming</title>
</head>

<body style="font-family: Arial; max-width: 700px; margin: 40px auto;">

  <h2>🜂 Game of Becoming</h2>

  <input id="input" placeholder="Enter prompt..." style="width: 80%; padding: 10px;" />
  <button onclick="send()">Enter</button>

  <pre id="output" style="margin-top: 20px; white-space: pre-wrap;"></pre>

  <script>
    async function send() {
      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");

      const input = inputEl.value.trim();

      if (!input) {
        outputEl.innerText = "Please enter a prompt.";
        return;
      }

      outputEl.innerText = "Processing...";

      try {
        const res = await fetch("https://game-of-becoming-github-io.vercel.app/api/process", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ input })
        });

        const data = await res.json();

        if (!res.ok) {
          outputEl.innerText = "Error: " + (data.error || "Unknown error");
          return;
        }

        outputEl.innerText = data.output || "No output returned.";
      } catch (err) {
        outputEl.innerText = "Network error: " + err.message;
      }
    }
  </script>

</body>
</html>
